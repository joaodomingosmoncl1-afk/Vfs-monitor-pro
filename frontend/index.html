<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#667eea">
  <meta name="description" content="Monitore vagas de visto VFS em tempo real">
  <title>VFS Monitor Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto';
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #333;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: #f0f0f0;
      color: #333;
    }

    .secondary-btn:hover {
      background: #e0e0e0;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .stats {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #e0e0e0;
    }

    .stat-card {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 12px;
      border-left: 4px solid #667eea;
    }

    .stat-label {
      color: #666;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .events-list {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 20px;
    }

    .event-item {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      border-left: 3px solid #667eea;
    }

    .event-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
      margin-top: 5px;
    }

    .status-available {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status-unavailable {
      background: #ffebee;
      color: #c62828;
    }

    @media (max-width: 768px) {
      .card {
        padding: 20px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🌍 VFS Monitor Pro</h1>
      <p class="subtitle">Monitore vagas de visto em tempo real</p>

      <div id="message" class="hidden"></div>

      <div id="login-section">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="seu@email.com">
        </div>
        <button id="btn-request-otp" onclick="requestOTP()">Solicitar Código</button>
      </div>

      <div id="otp-section" class="hidden">
        <div class="form-group">
          <label for="otp-code">Código OTP (6 dígitos)</label>
          <input id="otp-code" type="text" maxlength="6" placeholder="000000" 
                 onkeypress="if(this.value.length === 6) verifyOTP()">
          <small id="email-display"></small>
        </div>
        <button id="btn-verify-otp" onclick="verifyOTP()">Verificar Código</button>
        <button class="secondary-btn" onclick="backToLogin()">Voltar</button>
      </div>

      <div id="dashboard-section" class="hidden">
        <p style="text-align: center; color: #666; margin-bottom: 20px;" id="user-email"></p>
        
        <div class="stats">
          <h3 style="margin-bottom: 15px; color: #333; font-size: 16px;">📊 Estatísticas</h3>
          <div id="stats-container"></div>
        </div>

        <div class="events-list">
          <h3 style="margin-bottom: 15px; color: #333; font-size: 16px;">📋 Últimos Eventos</h3>
          <div id="events-container"></div>
        </div>

        <button class="secondary-btn" onclick="logout()" style="margin-top: 20px;">Sair</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3001/api';
    let token = localStorage.getItem('token');
    let userEmail = localStorage.getItem('userEmail');

    window.addEventListener('load', () => {
      if (token && userEmail) {
        showDashboard();
        loadEvents();
      }
    });

    async function requestOTP() {
      const email = document.getElementById('email').value;
      if (!email) {
        showMessage('Insira um email válido', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/request-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (response.ok) {
          showMessage('Código enviado para seu email!', 'success');
          document.getElementById('email-display').textContent = `Código enviado para ${email}`;
          showOTPSection(email);
        } else {
          showMessage(data.error || 'Erro ao solicitar código', 'error');
        }
      } catch (err) {
        showMessage('Erro de conexão: ' + err.message, 'error');
      }
    }

    async function verifyOTP() {
      const email = document.getElementById('email').value;
      const code = document.getElementById('otp-code').value;
      if (code.length !== 6) {
        showMessage('Insira um código de 6 dígitos', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });
        const data = await response.json();
        if (response.ok) {
          token = data.token;
          userEmail = email;
          localStorage.setItem('token', token);
          localStorage.setItem('userEmail', userEmail);
          showMessage('Login realizado com sucesso!', 'success');
          setTimeout(() => showDashboard(), 500);
        } else {
          showMessage(data.error || 'Código inválido', 'error');
        }
      } catch (err) {
        showMessage('Erro de conexão: ' + err.message, 'error');
      }
    }

    async function loadEvents() {
      try {
        const response = await fetch(`${API_URL}/events`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const events = await response.json();
        const container = document.getElementById('events-container');
        container.innerHTML = events.slice(0, 10).map(e => `
          <div class="event-item">
            <strong>${e.route === 'br' ? '🇧🇷 Brasil → Portugal' : '🇵🇹 Portugal → Brasil'}</strong><br>
            ${e.message}
            <div class="event-status ${e.status === 'available' ? 'status-available' : 'status-unavailable'}">
              ${e.status === 'available' ? '✅ Disponível' : '❌ Sem vagas'}
            </div>
            <div style="color: #999; font-size: 11px; margin-top: 5px;">${new Date(e.created_at).toLocaleString('pt-PT')}</div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Erro ao carregar eventos:', err);
      }
    }

    function showMessage(message, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = message;
      messageEl.className = type;
      messageEl.classList.remove('hidden');
      setTimeout(() => messageEl.classList.add('hidden'), 3000);
    }

    function showOTPSection(email) {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('otp-section').classList.remove('hidden');
    }

    function backToLogin() {
      document.getElementById('otp-section').classList.add('hidden');
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('otp-code').value = '';
    }

    function showDashboard() {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('otp-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.remove('hidden');
      document.getElementById('user-email').textContent = `Bem-vindo, ${userEmail}`;
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('userEmail');
      token = null;
      userEmail = null;
      document.getElementById('dashboard-section').classList.add('hidden');
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('email').value = '';
      document.getElementById('otp-code').value = '';
    }

    // Recarregar eventos a cada 10 segundos
    setInterval(() => {
      if (token) loadEvents();
    }, 10000);
  </script>
</body>
</html>
